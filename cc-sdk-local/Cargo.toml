[package]
edition = "2024"
name = "cc-sdk"
version = "0.8.1"
authors = ["ZhangHanDong"]
build = false
exclude = [
    "examples/",
    "tests/",
    "doc/",
    "README_*.md",
    "*.sh",
    "*.py",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust SDK for Claude Code CLI with full interactive capabilities"
documentation = "https://docs.rs/cc-sdk"
readme = "README.md"
keywords = [
    "claude",
    "claude-code",
    "sdk",
    "ai",
    "llm",
]
categories = [
    "api-bindings",
    "asynchronous",
    "development-tools",
]
license = "MIT"
repository = "https://github.com/ZhangHanDong/claude-code-api-rs"
resolver = "2"

[features]
auto-download = ["reqwest"]
default = ["auto-download"]
websocket = [
    "tokio-tungstenite",
    "url",
    "http",
]

[lib]
name = "cc_sdk"
path = "src/lib.rs"

[[bin]]
name = "test_interactive"
path = "src/bin/test_interactive.rs"

